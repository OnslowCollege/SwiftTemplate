name: Build Swift image

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: oc-big-runner
    steps:
      - name: checkout code
        uses: actions/checkout@v2
      - name: install buildx
        id: buildx
        uses: crazy-max/ghaction-docker-buildx@v1
        with:
          version: latest
      - name: login to docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ghcr.io --username "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: build the image
        run: docker buildx build -t "ghcr.io/onslowcollege/swifttemplate:latest" --platform linux/arm64/v8,linux/amd64 --push ./.github/workflows